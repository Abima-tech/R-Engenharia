<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R. Engenharia | Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --accent: #007aff; --gray: #f5f5f7; }
        * { box-sizing: border-box; }
        body { background-color: #f0f0f2; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; font-family: 'Inter', sans-serif; }
        .mobile-container { width: 100%; max-width: 400px; background-color: var(--bg); border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #ddd; margin-bottom: 30px; }
        .section { padding: 40px 25px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 28px; line-height: 1.2; margin: 15px 0; font-weight: 600; }
        .tag { text-transform: uppercase; letter-spacing: 3px; font-size: 10px; color: var(--accent); font-weight: 700; }
        .price-card { background: var(--gray); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .price-card h3 { margin: 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .price-card .val { font-size: 22px; font-weight: 700; margin: 5px 0; }
        .btn-mobile { background: var(--text); color: #fff; text-align: center; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .img-hero { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="section">
        <span class="tag">R. Engenharia</span>
        <h1>Energia solar inteligente.</h1>
        <img src="https://images.unsplash.com/photo-1509391366360-fe5bb58583bb?q=80&w=500&auto=format&fit=crop" class="img-hero">
        <p>Economize até 95% na sua conta de luz com tecnologia de precisão em Macapá.</p>
        
        <div class="price-card">
            <h3>Oferta 1000 kWh</h3>
            <div class="val">R$ 17.477,00</div>
            <small>Em até 18x no cartão</small>
        </div>

        <a href="https://wa.me/5596984132588" class="btn-mobile" style="background: #25D366;">
            <i class="fa-brands fa-whatsapp"></i> Falar com Especialista
        </a>
    </div>
</div>

</body>
</html>
